<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- Hero Section -->
<section class="hero" id="home">
    <div id="three-container"></div>
    <div class="hero-overlay">
        <div class="hero-content">
            <span class="hero-badge"><i class="fas fa-crown"></i> Cooch Behar's #1 Premium Cafe</span>
            <h1>Where Every <br><span class="highlight">Moment</span> Tastes <br>Like <span class="highlight">Magic</span></h1>
            <p>Experience the finest coffee, hookah, and gourmet food in an exclusive, cozy atmosphere.</p>
            <div class="hero-buttons">
                <a href="#reservation" class="btn-primary">
                    <i class="fas fa-calendar-plus"></i> Reserve Your Table
                </a>
                <a href="#menu" class="btn-outline">
                    <i class="fas fa-utensils"></i> Explore Menu
                </a>
            </div>
        </div>
    </div>
</section>

<script>
    (function initHero3D() {
        const container = document.getElementById('three-container');
        if (!container) return;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f0e0e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffeedd, 1);
        mainLight.position.set(3, 5, 5);
        mainLight.castShadow = true;
        scene.add(mainLight);

        const goldLight = new THREE.PointLight(0xd4a859, 0.8);
        goldLight.position.set(2, 1, 4);
        scene.add(goldLight);

        const backLight = new THREE.PointLight(0x6c5ce7, 0.4);
        backLight.position.set(-3, 0, 3);
        scene.add(backLight);

        // --- Main 3D Group ---
        const group = new THREE.Group();
        scene.add(group);

        // --- Create a 3D Coffee Cup ---
        const cupGroup = new THREE.Group();

        // Cup Body (Cylinder with curved top)
        const cupGeo = new THREE.CylinderGeometry(0.8, 0.6, 1.2, 32, 1, true);
        const cupMat = new THREE.MeshPhysicalMaterial({
            color: 0xd4a859,
            metalness: 0.3,
            roughness: 0.2,
            transparent: true,
            opacity: 0.85,
            side: THREE.DoubleSide,
            clearcoat: 0.1
        });
        const cup = new THREE.Mesh(cupGeo, cupMat);
        cup.position.y = 0.2;
        cup.castShadow = true;
        cupGroup.add(cup);

        // Cup Bottom
        const bottomGeo = new THREE.CircleGeometry(0.6, 32);
        const bottomMat = new THREE.MeshPhysicalMaterial({
            color: 0xd4a859,
            metalness: 0.4,
            roughness: 0.3,
            side: THREE.DoubleSide
        });
        const bottom = new THREE.Mesh(bottomGeo, bottomMat);
        bottom.rotation.x = -Math.PI / 2;
        bottom.position.y = -0.4;
        cupGroup.add(bottom);

        // Cup Top (Opening)
        const topGeo = new THREE.CircleGeometry(0.8, 32);
        const topMat = new THREE.MeshPhysicalMaterial({
            color: 0x2a1f1a,
            roughness: 0.8,
            metalness: 0.1,
            side: THREE.DoubleSide
        });
        const top = new THREE.Mesh(topGeo, topMat);
        top.rotation.x = -Math.PI / 2;
        top.position.y = 0.8;
        cupGroup.add(top);

        // Coffee inside
        const coffeeGeo = new THREE.CircleGeometry(0.7, 32);
        const coffeeMat = new THREE.MeshPhysicalMaterial({
            color: 0x3a1f0d,
            roughness: 0.9,
            metalness: 0.0,
            side: THREE.DoubleSide
        });
        const coffee = new THREE.Mesh(coffeeGeo, coffeeMat);
        coffee.rotation.x = -Math.PI / 2;
        coffee.position.y = 0.79;
        cupGroup.add(coffee);

        // Cup Handle
        const handleShape = new THREE.Shape();
        handleShape.moveTo(0.8, 0.1);
        handleShape.quadraticCurveTo(1.2, 0.1, 1.2, 0.4);
        handleShape.quadraticCurveTo(1.2, 0.7, 0.8, 0.7);
        const handleGeo = new THREE.ShapeGeometry(handleShape);
        const handleMat = new THREE.MeshPhysicalMaterial({
            color: 0xd4a859,
            metalness: 0.3,
            roughness: 0.2,
            side: THREE.DoubleSide
        });
        const handle = new THREE.Mesh(handleGeo, handleMat);
        handle.position.set(0, 0.1, 0);
        handle.rotation.z = -0.1;
        cupGroup.add(handle);

        cupGroup.position.y = -0.3;
        group.add(cupGroup);

        // --- Floating Particles (Steam) ---
        const particleCount = 400;
        const posArray = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);
        for (let i = 0; i < particleCount; i++) {
            const radius = 0.8 + Math.random() * 1.2;
            const angle = Math.random() * Math.PI * 2;
            const height = Math.random() * 2.0;
            posArray[i*3] = Math.cos(angle) * radius * 0.5;
            posArray[i*3+1] = height + 0.5;
            posArray[i*3+2] = Math.sin(angle) * radius * 0.5;
            sizes[i] = 0.02 + Math.random() * 0.04;
        }
        const particleGeo = new THREE.BufferGeometry();
        particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const particleMat = new THREE.PointsMaterial({
            color: 0xd4a859,
            size: 0.04,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true
        });
        const particles = new THREE.Points(particleGeo, particleMat);
        particles.position.y = 0.2;
        group.add(particles);

        // --- Glowing Ring ---
        const ringMat = new THREE.MeshBasicMaterial({
            color: 0xd4a859,
            transparent: true,
            opacity: 0.15,
            wireframe: true
        });
        const ring = new THREE.Mesh(new THREE.TorusGeometry(1.4, 0.03, 16, 64), ringMat);
        ring.rotation.x = Math.PI / 2;
        ring.position.y = 0.2;
        group.add(ring);

        // --- Small Orbiting Spheres ---
        const spheres = [];
        for (let i = 0; i < 6; i++) {
            const sphereMat = new THREE.MeshPhysicalMaterial({
                color: 0xd4a859,
                metalness: 0.7,
                roughness: 0.2,
                emissive: 0xd4a859,
                emissiveIntensity: 0.1
            });
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), sphereMat);
            const angle = (i / 6) * Math.PI * 2;
            const radius = 1.6;
            sphere.position.set(Math.cos(angle) * radius, Math.sin(angle * 2) * 0.2, Math.sin(angle) * radius);
            group.add(sphere);
            spheres.push({ mesh: sphere, angle: angle, radius: radius, speed: 0.3 + Math.random() * 0.2 });
        }

        // --- Mouse Interaction ---
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            // Rotate whole group slowly
            group.rotation.y += 0.004;
            group.rotation.x = Math.sin(time * 0.15) * 0.05;
            group.rotation.z = Math.sin(time * 0.1) * 0.03;

            // Float the cup
            cupGroup.position.y = -0.3 + Math.sin(time * 0.5) * 0.05;

            // Rotate ring
            ring.rotation.z += 0.005;

            // Animate particles (steam)
            const positions = particles.geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                positions[i*3+1] += 0.002;
                if (positions[i*3+1] > 2.5) {
                    positions[i*3+1] = 0.5;
                    positions[i*3] = (Math.random() - 0.5) * 1.2;
                    positions[i*3+2] = (Math.random() - 0.5) * 1.2;
                }
            }
            particles.geometry.attributes.position.needsUpdate = true;

            // Animate orbiting spheres
            spheres.forEach((s, i) => {
                s.mesh.position.x = Math.cos(time * s.speed + s.angle) * s.radius;
                s.mesh.position.z = Math.sin(time * s.speed + s.angle) * s.radius;
                s.mesh.position.y = Math.sin(time * 0.5 + i) * 0.2;
            });

            // Camera follow mouse (gentle)
            camera.position.x += (mouseX * 0.5 - camera.position.x) * 0.01;
            camera.position.y += (mouseY * 0.3 + 1.5 - camera.position.y) * 0.01;
            camera.lookAt(0, 0.2, 0);

            renderer.render(scene, camera);
        }

        animate();
    })();
</script>
